name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.1). Must already exist."
        required: true
        type: string

jobs:
  build:
    name: Build aarch64 (Apple Silicon)
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Syncing version to $VERSION (from tag $TAG)"

          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');" "$VERSION"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');" "$VERSION"

          awk -v ver="$VERSION" '
            /^\[package\]/ { inpkg=1 }
            /^\[/ && !/^\[package\]/ { inpkg=0 }
            inpkg && /^version[[:space:]]*=/ { sub(/"[^"]*"/, "\"" ver "\"") }
            { print }
          ' src-tauri/Cargo.toml > src-tauri/Cargo.toml.new
          mv src-tauri/Cargo.toml.new src-tauri/Cargo.toml

          echo "--- package.json ---"
          grep '"version"' package.json | head -1
          echo "--- tauri.conf.json ---"
          grep '"version"' src-tauri/tauri.conf.json | head -1
          echo "--- Cargo.toml ---"
          grep '^version' src-tauri/Cargo.toml | head -1

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Star Gazer ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Star Gazer ${{ github.event.inputs.tag || github.ref_name }}

            macOS builds are ad-hoc signed but **not notarized**. On first launch macOS will refuse to open the app — open **System Settings → Privacy & Security**, scroll to the `"Star Gazer" was blocked` notice and click **Open Anyway**. You only need to do this once.

            See the assets below to download this version.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
